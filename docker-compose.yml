services:
  core:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: commit-matrix-core
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      # We ONLY mount the data layer. Code is baked into the image.
      - ./data:/app/data
