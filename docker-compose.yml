services:
  core:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: commit-matrix-core:latest
    container_name: commit-matrix-core
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./rubrics:/app/rubrics
      - ./backend:/app/backend
      - ./templates:/app/templates
      - ./static:/app/static
      - ./VERSION:/app/VERSION
      - /var/run/docker.sock:/var/run/docker.sock
